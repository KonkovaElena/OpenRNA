name: Supply Chain Provenance

on:
  push:
    branches:
      - main
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: read

jobs:
  attest-build:
    name: Build Bundle And Attest
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate runtime SBOM
        run: npm run sbom:cyclonedx:file

      - name: Package attestable build artifact
        run: tar -czf openrna-dist-${{ github.sha }}.tgz dist package.json package-lock.json README.md LICENSE

      - name: Generate checksums
        run: sha256sum openrna-dist-${{ github.sha }}.tgz openrna-runtime-sbom.cdx.json > openrna-artifacts.sha256

      - name: Upload build bundle
        uses: actions/upload-artifact@v4
        with:
          name: openrna-dist-${{ github.sha }}
          path: openrna-dist-${{ github.sha }}.tgz

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: openrna-runtime-sbom-${{ github.sha }}
          path: openrna-runtime-sbom.cdx.json

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: openrna-artifacts-sha256-${{ github.sha }}
          path: openrna-artifacts.sha256

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: ${{ github.workspace }}/openrna-dist-${{ github.sha }}.tgz

      - name: Attest SBOM
        uses: actions/attest@v4
        with:
          subject-path: ${{ github.workspace }}/openrna-dist-${{ github.sha }}.tgz
          sbom-path: ${{ github.workspace }}/openrna-runtime-sbom.cdx.json

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" > /dev/null 2>&1; then
            echo "Release $TAG_NAME already exists; skipping create."
            exit 0
          fi

          gh release create "$TAG_NAME" \
            openrna-dist-${{ github.sha }}.tgz \
            openrna-runtime-sbom.cdx.json \
            openrna-artifacts.sha256 \
            --verify-tag \
            --generate-notes