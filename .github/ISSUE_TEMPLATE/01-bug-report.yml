name: Bug report
description: Report a reproducible defect in the OpenRNA software surface.
title: "[Bug]: "
labels:
  - bug
  - triage
type: bug
body:
  - type: markdown
    attributes:
      value: |
        Use this form for software defects only.

        Do not include patient data, secrets, or exploit details for security vulnerabilities.
        For sensitive security reports, follow the private path in SECURITY.md instead.

  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Tag, commit SHA, or branch name where you observed the problem.
      placeholder: ex. v0.1.0 or a1b2c3d
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      description: Choose the closest affected area.
      options:
        - API / routes
        - Workflow orchestration
        - Persistence / PostgreSQL
        - Validation / contracts
        - CI / repository automation
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the smallest reproducible sequence of commands, requests, or inputs.
      placeholder: |
        1. npm ci
        2. npm run build
        3. POST /api/...
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: Describe what should have happened.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: Describe what happened instead, including operator-visible errors.
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Logs, payloads, or screenshots
      description: Paste sanitized logs or HTTP payload fragments. Remove secrets and personal data.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I reproduced this on the Node 24 baseline from .nvmrc.
          required: true
        - label: I removed secrets, patient data, and exploit details from this report.
          required: true
        - label: I agree to follow this project's Code of Conduct.
          required: true